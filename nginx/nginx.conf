# Pix Compliance AaaS v7.0 — nginx reverse proxy with TLS
# Deploy: copy to /etc/nginx/sites-available/pixcompliance and symlink to sites-enabled
# Requires: certbot (Let's Encrypt) for TLS certificate

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # TLS — issue with: certbot --nginx -d your-domain.com
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — preload after first stable deployment
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Security headers (supplement helmet.js in Node)
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Backend API (Node.js on port 3001)
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Security: limit request body
        client_max_body_size 10k;

        # Timeouts
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
    }

    location /health {
        proxy_pass http://127.0.0.1:3001;
        access_log off; # don't log health checks
    }

    # Frontend static files (after npm run build)
    root /var/www/pixcompliance/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html; # SPA fallback
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Cache assets aggressively (they have content hashes in filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Block common attack vectors
    location ~ /\. { deny all; }
    location ~ \.env { deny all; }
}
